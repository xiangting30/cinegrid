<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineGrid Studio - 独立版</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD - Works offline/locally via file://) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a; /* Slate 900 */
        color: #f8fafc;
        margin: 0;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }
      
      .animate-in { animation: animateIn 0.2s ease-out; }
      @keyframes animateIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      
      #error-log { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #7f1d1d; color: white; padding: 1rem; font-family: monospace; font-size: 12px; z-index: 9999; }
    </style>
  </head>
  <body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-family: sans-serif;">
            <div style="margin-bottom: 20px;">正在初始化 CineGrid...</div>
            <div style="font-size: 12px; opacity: 0.7;">如果长时间无反应，请尝试刷新页面</div>
        </div>
    </div>
    <div id="error-log"></div>

    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.getElementById('error-log');
        div.style.display = 'block';
        div.innerHTML += '<div>Error: ' + msg + ' (Line: ' + lineNo + ')</div>';
        return false;
      };
    </script>

    <!-- MAIN SCRIPT (No type="module" to support file://) -->
    <script type="text/babel">
      // Destructure Globals
      const { useState, useRef, useEffect, useCallback } = React;
      const { createRoot } = ReactDOM;

      // --- UTILS ---
      const generateId = () => {
        if (typeof crypto !== 'undefined' && crypto.randomUUID) {
            return crypto.randomUUID();
        }
        return Math.random().toString(36).substring(2, 15);
      };

      // --- ICONS (Inline) ---
      const Icons = {
        LayoutGrid: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
        Download: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
        Plus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
        Scissors: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/></svg>,
        Trash: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
        ImageIcon: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
        Columns: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" x2="12" y1="3" y2="21"/></svg>,
        Sparkles: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/></svg>,
        Palette: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>,
        Type: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>,
        GripVertical: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>,
        Maximize: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>,
        Trash2: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
        Upload: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
        MoreHorizontal: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
        Copy: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
        Check: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
        Scan: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>,
        StretchHorizontal: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="6" x="2" y="4" rx="2"/><rect width="20" height="6" x="2" y="14" rx="2"/></svg>,
        X: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 18 18"/></svg>,
        CropIcon: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>,
        ClipboardPaste: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2M16 4h2a2 2 0 0 1 2 2v2M11 14h10"/><path d="m17 10 4 4-4 4"/></svg>,
      };

      // --- CONFIGURATION ---
      const ShotPreset = {
        ELS: "ELS (超远景)", LS: "LS (远景)", MLS: "MLS (中远景)", MS: "MS (中景)",
        MCU: "MCU (中近景)", CU: "CU (特写)", ECU: "ECU (极特写)",
        LOW_ANGLE: "Low Angle (低角度)", HIGH_ANGLE: "High Angle (高角度)"
      };
      const SHOT_PRESETS = Object.values(ShotPreset);

      // --- SERVICES ---
      const analyzeShotType = async (base64Image) => {
        return new Promise((resolve) => setTimeout(() => resolve("AI功能仅在线可用"), 800));
      };

      // --- COMPONENTS ---
      const Button = ({ children, variant = 'primary', size = 'md', isLoading, className = '', disabled, ...props }) => {
        const baseStyle = "inline-flex items-center justify-center rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900";
        const variants = {
          primary: "bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-500",
          secondary: "bg-slate-700 hover:bg-slate-600 text-slate-100 focus:ring-slate-500",
          danger: "bg-red-600 hover:bg-red-700 text-white focus:ring-red-500",
          ghost: "bg-transparent hover:bg-slate-800 text-slate-300 focus:ring-slate-500",
        };
        const sizes = { sm: "px-3 py-1.5 text-sm", md: "px-4 py-2 text-base", lg: "px-6 py-3 text-lg" };
        return (
          <button className={`${baseStyle} ${variants[variant]} ${sizes[size]} ${className} ${disabled || isLoading ? 'opacity-50 cursor-not-allowed' : ''}`} disabled={disabled || isLoading} {...props}>
            {isLoading ? <span className="mr-2">...</span> : null}
            {children}
          </button>
        );
      };

      const ImageCropper = ({ imageUrl, onCancel, onExtract, onComplete, onImageReplace }) => {
        const containerRef = useRef(null);
        const imageRef = useRef(null);
        const fileInputRef = useRef(null);
        const [crop, setCrop] = useState({ x: 10, y: 10, width: 50, height: 50 });
        const [isDragging, setIsDragging] = useState(false);
        const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
        const [startCrop, setStartCrop] = useState({ x: 0, y: 0, width: 0, height: 0 });
        const [action, setAction] = useState('move');

        useEffect(() => {
          const handlePaste = (e) => {
              const items = e.clipboardData?.items;
              if (!items) return;
              for (let i = 0; i < items.length; i++) {
                  if (items[i].type.indexOf('image') !== -1) {
                      const blob = items[i].getAsFile();
                      if (blob) {
                          const reader = new FileReader();
                          reader.onload = (event) => event.target?.result && onImageReplace(event.target.result);
                          reader.readAsDataURL(blob);
                      }
                      break;
                  }
              }
          };
          window.addEventListener('paste', handlePaste);
          return () => window.removeEventListener('paste', handlePaste);
        }, [onImageReplace]);

        const handleMouseDown = (e, type) => {
          e.preventDefault(); e.stopPropagation();
          setIsDragging(true); setAction(type);
          setDragStart({ x: e.clientX, y: e.clientY });
          setStartCrop({ ...crop });
        };

        const handleMouseMove = useCallback((e) => {
          if (!isDragging || !containerRef.current) return;
          const deltaXPercent = ((e.clientX - dragStart.x) / containerRef.current.offsetWidth) * 100;
          const deltaYPercent = ((e.clientY - dragStart.y) / containerRef.current.offsetHeight) * 100;
          setCrop((prev) => {
            let newCrop = { ...prev };
            if (action === 'move') {
              newCrop.x = Math.max(0, Math.min(100 - startCrop.width, startCrop.x + deltaXPercent));
              newCrop.y = Math.max(0, Math.min(100 - startCrop.height, startCrop.y + deltaYPercent));
            } else if (action === 'resize-se') {
              newCrop.width = Math.max(5, Math.min(100 - startCrop.x, startCrop.width + deltaXPercent));
              newCrop.height = Math.max(5, Math.min(100 - startCrop.y, startCrop.height + deltaYPercent));
            }
            return newCrop;
          });
        }, [isDragging, dragStart, action, startCrop]);

        const handleMouseUp = useCallback(() => setIsDragging(false), []);
        useEffect(() => {
          if (isDragging) { window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', handleMouseUp); }
          else { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); }
          return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); };
        }, [isDragging, handleMouseMove, handleMouseUp]);

        const getCroppedBase64 = () => {
          if (!imageRef.current) return null;
          const canvas = document.createElement('canvas');
          const image = imageRef.current;
          const scaleX = image.naturalWidth / image.width;
          const scaleY = image.naturalHeight / image.height;
          canvas.width = (crop.width / 100) * image.width * scaleX;
          canvas.height = (crop.height / 100) * image.height * scaleY;
          const ctx = canvas.getContext('2d');
          if (!ctx) return null;
          ctx.drawImage(image, (crop.x / 100) * image.width * scaleX, (crop.y / 100) * image.height * scaleY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
          return canvas.toDataURL('image/png');
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-in">
            <div className="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl flex flex-col w-full max-w-5xl max-h-[90vh] overflow-hidden">
              <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <div className="flex items-center space-x-2 text-slate-100"><Icons.CropIcon className="w-5 h-5" /><h3 className="font-semibold text-lg">裁剪与提取</h3></div>
                <div className="flex items-center space-x-2">
                  <Button variant="ghost" onClick={onCancel} size="sm"><Icons.X className="w-4 h-4 mr-1" /> 取消</Button>
                  {imageUrl && <><Button variant="secondary" onClick={() => { const b = getCroppedBase64(); if(b) onExtract(b); }} size="sm" className="hidden sm:inline-flex"><Icons.Plus className="w-4 h-4 mr-1" /> 提取</Button><Button variant="primary" onClick={() => { const b = getCroppedBase64(); if(b) onComplete(b); }} size="sm"><Icons.Check className="w-4 h-4 mr-1" /> 完成</Button></>}
                </div>
              </div>
              <div className="flex-1 overflow-auto p-6 flex items-center justify-center bg-slate-950 relative select-none min-h-[400px]">
                {imageUrl ? (
                  <div className="relative inline-block" ref={containerRef}>
                    <img ref={imageRef} src={imageUrl} className="max-h-[70vh] max-w-full object-contain pointer-events-none" draggable={false} />
                    <div className="absolute inset-0 bg-black/50" style={{ clipPath: `polygon(0% 0%, 0% 100%, ${crop.x}% 100%, ${crop.x}% ${crop.y}%, ${crop.x + crop.width}% ${crop.y}%, ${crop.x + crop.width}% ${crop.y + crop.height}%, ${crop.x}% ${crop.y + crop.height}%, ${crop.x}% 100%, 100% 100%, 100% 0%)` }}></div>
                    <div className="absolute border-2 border-indigo-500 shadow-[0_0_0_9999px_rgba(0,0,0,0.5)] cursor-move group" style={{ left: `${crop.x}%`, top: `${crop.y}%`, width: `${crop.width}%`, height: `${crop.height}%` }} onMouseDown={(e) => handleMouseDown(e, 'move')}>
                      <div className="absolute -bottom-2 -right-2 w-6 h-6 bg-indigo-600 rounded-full cursor-se-resize flex items-center justify-center shadow-md z-10" onMouseDown={(e) => handleMouseDown(e, 'resize-se')}><div className="w-2 h-2 bg-white rounded-full"></div></div>
                    </div>
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center text-center space-y-6 max-w-md w-full p-10 border-2 border-dashed border-slate-700 rounded-2xl bg-slate-800/20">
                     <div className="p-4 bg-slate-800 rounded-full shadow-lg"><Icons.ImageIcon className="w-12 h-12 text-indigo-400" /></div>
                     <div className="flex flex-col w-full gap-3"><Button onClick={() => fileInputRef.current?.click()} className="w-full"><Icons.Upload className="w-5 h-5 mr-2" /> 选择文件</Button></div>
                     <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => { const f = e.target.files?.[0]; if(f) { const r = new FileReader(); r.onload = (ev) => ev.target?.result && onImageReplace(ev.target.result); r.readAsDataURL(f); } }} />
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const GridCell = ({ item, styleSettings, onUpdate, onRemove, onImageUpload, onDragStart, onDragEnter, onDragEnd, draggable }) => {
        const [isAnalyzing, setIsAnalyzing] = useState(false);
        const [showPresets, setShowPresets] = useState(false);
        const [isFileDragOver, setIsFileDragOver] = useState(false);
        const [isCopying, setIsCopying] = useState(false);
        const [isResizing, setIsResizing] = useState(false);
        const cellRef = useRef(null);

        const handleMouseDownResizeCorner = (e) => {
          e.preventDefault(); e.stopPropagation(); setIsResizing(true);
          const startX = e.clientX; const startY = e.clientY;
          const cellEl = cellRef.current;
          const startW = cellEl.getBoundingClientRect().width;
          const startH = cellEl.getBoundingClientRect().height;
          const wrapper = cellEl.parentElement.parentElement;
          const container = wrapper.parentElement;
          const startWrapperW = wrapper.getBoundingClientRect().width;
          const containerW = container.getBoundingClientRect().width;

          const handleMove = (ev) => {
             const dx = ev.clientX - startX; const dy = ev.clientY - startY;
             const newContentW = Math.max(50, startW + dx);
             const newContentH = Math.max(50, startH + dy);
             const newWrapperW = Math.max(50 + (startWrapperW - startW), startWrapperW + dx);
             onUpdate(item.id, { width: Math.max(5, Math.min(100, (newWrapperW / containerW) * 100)), aspectRatio: newContentW / newContentH });
          };
          const handleUp = () => { setIsResizing(false); window.removeEventListener('mousemove', handleMove); window.removeEventListener('mouseup', handleUp); };
          window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleUp);
        };

        const handleAnalysis = async () => { if(!item.imageData) return; setIsAnalyzing(true); onUpdate(item.id, { shotLabel: await analyzeShotType(item.imageData) }); setIsAnalyzing(false); };

        const handleCopy = async (e) => {
          e.stopPropagation();
          if (!item.imageData) return;

          try {
            // Check if API is available (blocked on file://)
            if (!navigator.clipboard || !navigator.clipboard.write) {
                throw new Error("Clipboard API unavailable in this context");
            }

            const response = await fetch(item.imageData);
            const blob = await response.blob();
            
            await navigator.clipboard.write([
              new ClipboardItem({ [blob.type]: blob })
            ]);
            
            setIsCopying(true);
            setTimeout(() => setIsCopying(false), 2000);
          } catch (err) {
            console.warn('Copy failed:', err);
            // Fallback alert for file:// protocol users
            alert('无法自动复制：浏览器限制了本地文件(file://)的剪贴板权限。\n\n请右键点击图片，选择「复制图片」。');
          }
        };

        return (
          <div ref={cellRef} className={`flex flex-col h-full bg-slate-800 overflow-hidden shadow-sm group relative hover:shadow-lg ${isFileDragOver ? 'ring-2 ring-indigo-500' : ''}`}
            style={{ borderWidth: `${styleSettings.borderWidth}px`, borderColor: isFileDragOver ? '#6366f1' : styleSettings.borderColor, borderRadius: '0.5rem', transition: isResizing ? 'none' : 'all 0.2s' }}
            draggable={draggable && !isResizing} onDragStart={onDragStart} onDragEnter={onDragEnter} onDragEnd={onDragEnd}
            onDragOver={(e) => { e.preventDefault(); if(e.dataTransfer.types.includes('Files')) setIsFileDragOver(true); }}
            onDragLeave={(e) => { e.preventDefault(); setIsFileDragOver(false); }}
            onDrop={(e) => { e.preventDefault(); e.stopPropagation(); setIsFileDragOver(false); if(e.dataTransfer.files[0]) onImageUpload(e.dataTransfer.files[0]); }}
          >
            {isFileDragOver && <div className="absolute inset-0 z-50 bg-slate-900/80 flex items-center justify-center text-indigo-400"><Icons.Upload className="w-10 h-10 mb-2 animate-bounce" /></div>}
            <div className="absolute top-2 left-2 z-10 opacity-0 group-hover:opacity-100 cursor-move bg-black/40 rounded p-1"><Icons.GripVertical className="w-4 h-4 text-white" /></div>
            
            <div className="relative flex-1 bg-slate-900 overflow-hidden flex items-center justify-center min-h-[50px]">
              {item.imageData ? (
                <>
                  <img src={item.imageData} className="w-full h-full select-none pointer-events-none" style={{ objectFit: item.imageFit || 'cover' }} />
                  <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex space-x-1 items-center">
                     <button onClick={(e) => {e.stopPropagation(); onUpdate(item.id, {imageFit: item.imageFit === 'contain' ? 'fill' : item.imageFit === 'fill' ? 'cover' : 'contain'})}} className="bg-slate-700/80 p-1.5 rounded-full mr-1 text-white"><Icons.Maximize className="w-4 h-4" /></button>
                     <button onClick={handleCopy} className="bg-slate-700/80 p-1.5 rounded-full mr-1 text-white">{isCopying ? <Icons.Check className="w-4 h-4" /> : <Icons.Copy className="w-4 h-4" />}</button>
                     <label className="bg-slate-700/80 p-1.5 rounded-full mr-1 text-white cursor-pointer"><Icons.Upload className="w-4 h-4" /><input type="file" className="hidden" accept="image/*" onChange={(e) => e.target.files?.[0] && onImageUpload(e.target.files[0])} /></label>
                     <button onClick={(e) => {e.stopPropagation(); onRemove(item.id)}} className="bg-red-500/80 p-1.5 rounded-full text-white"><Icons.Trash2 className="w-4 h-4" /></button>
                  </div>
                </>
              ) : (
                <label className="cursor-pointer flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-400 hover:bg-slate-800/50 p-4">
                  <Icons.Upload className="w-8 h-8 mb-2 opacity-50" /><span className="text-xs">点击上传</span>
                  <input type="file" className="hidden" accept="image/*" onChange={(e) => e.target.files?.[0] && onImageUpload(e.target.files[0])} />
                </label>
              )}
            </div>

            <div className="p-2 bg-slate-800 border-t relative" style={{ borderColor: styleSettings.borderColor }}>
              <div className="flex gap-2 items-center">
                 <div className="relative flex-1">
                   <input type="text" value={item.shotLabel} onChange={(e) => onUpdate(item.id, { shotLabel: e.target.value })} placeholder="镜头类型..." style={{ fontSize: `${styleSettings.fontSize}px`, color: styleSettings.fontColor }} className="w-full bg-transparent border border-slate-600/50 rounded px-2 py-1 outline-none" />
                   <button onClick={() => setShowPresets(!showPresets)} className="absolute right-1 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white p-1"><Icons.MoreHorizontal className="w-3 h-3" /></button>
                   {showPresets && <div className="absolute bottom-full left-0 w-full bg-slate-700 rounded shadow-xl border border-slate-600 mb-1 z-20 max-h-48 overflow-y-auto">{SHOT_PRESETS.map(p => <button key={p} onClick={() => { onUpdate(item.id, { shotLabel: p }); setShowPresets(false); }} className="block w-full text-left px-3 py-2 text-xs text-slate-200 hover:bg-indigo-600">{p}</button>)}</div>}
                 </div>
                 <Button variant="ghost" size="sm" disabled={!item.imageData || isAnalyzing} isLoading={isAnalyzing} onClick={handleAnalysis} className="px-1 text-indigo-400" title="AI 功能需要在线环境"><Icons.Sparkles className="w-4 h-4" /></Button>
              </div>
            </div>
            <div className="absolute bottom-0 right-0 w-6 h-6 z-30 cursor-nwse-resize flex items-end justify-end p-1 opacity-0 group-hover:opacity-100" onMouseDown={handleMouseDownResizeCorner}><div className="w-2 h-2 border-r-2 border-b-2 border-indigo-400 rounded-br-sm"></div></div>
          </div>
        );
      };

      const App = () => {
        const [gridItems, setGridItems] = useState([]);
        const [defaultColumns, setDefaultColumns] = useState(2);
        const [isCropperOpen, setIsCropperOpen] = useState(false);
        const [selectedFileForCrop, setSelectedFileForCrop] = useState(null);
        const [styleSettings, setStyleSettings] = useState({ gap: 16, borderWidth: 1, borderColor: '#334155', fontSize: 14, fontColor: '#f8fafc', aspectRatio: '4/5' });
        const gridContainerRef = useRef(null);
        const dragItem = useRef(null);
        const dragOverItem = useRef(null);

        // --- HELPER FUNCTIONS ---
        const getDefaultAspectRatioValue = () => { const [w, h] = styleSettings.aspectRatio.split('/').map(Number); return w / h; };
        
        const loadImage = (url, lbl='') => new Promise(r => { 
            const i = new Image(); 
            i.onload = () => r({ id: generateId(), imageData: url, shotLabel: lbl, aspectRatio: i.width/i.height, imageFit: 'cover', width: 100/defaultColumns }); 
            i.src = url; 
        });

        // --- HANDLERS (Defined inside App to fix ReferenceError) ---
        const handleAddItem = () => {
            const ratio = getDefaultAspectRatioValue();
            const newItem = {
                id: generateId(),
                imageData: null,
                shotLabel: '',
                aspectRatio: ratio,
                imageFit: 'cover',
                width: 100 / defaultColumns
            };
            setGridItems([...gridItems, newItem]);
        };

        const handleUpdateItem = (id, updates) => {
             if (updates.imageData) {
                 const img = new Image();
                 img.onload = () => {
                     const ratio = img.width / img.height;
                     setGridItems(prev => prev.map(item => item.id === id ? { ...item, ...updates, aspectRatio: ratio } : item));
                 };
                 img.src = updates.imageData;
             } else {
                 setGridItems(prev => prev.map(item => item.id === id ? { ...item, ...updates } : item));
             }
        };

        const handleRemoveItem = (id) => {
            setGridItems(prev => prev.filter(item => item.id !== id));
        };

        const handleCropAdd = (croppedBase64) => {
            loadImage(croppedBase64, '裁剪素材').then(newItem => {
                setGridItems(prev => [...prev, newItem]);
            });
        };

        useEffect(() => {
          const paste = (e) => {
            if(isCropperOpen) return;
            const item = Array.from(e.clipboardData?.items || []).find(i => i.type.includes('image'));
            if(item) { e.preventDefault(); const r = new FileReader(); r.onload = (ev) => ev.target?.result && loadImage(ev.target.result, '粘贴图片').then(n => setGridItems(p => [...p, n])); r.readAsDataURL(item.getAsFile()); }
          };
          window.addEventListener('paste', paste); return () => window.removeEventListener('paste', paste);
        }, [isCropperOpen, defaultColumns]);

        const handleExport = () => {
           const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
           const exportW = 1600; const gap = styleSettings.gap; const textH = 50 + (styleSettings.fontSize - 14) * 2;
           let currX = gap, currY = gap, rowH = 0, rowItems = [], posItems = [];

           const flush = () => {
               rowH = Math.max(...rowItems.map(i => i.totalHeight), 0);
               let rx = gap;
               rowItems.forEach(p => { posItems.push({ ...p, x: rx, y: currY }); rx += p.width + gap; });
               currY += rowH + gap; rowItems = [];
           };

           gridItems.forEach(item => {
               const effectiveW = exportW + gap;
               const slotW = effectiveW * ((item.width || (100/defaultColumns)) / 100);
               const cardW = slotW - gap;
               const imgH = cardW / (item.aspectRatio || getDefaultAspectRatioValue());
               const totH = imgH + textH;
               if(rowItems.length > 0 && (currX + slotW > effectiveW + 1)) { flush(); currX = 0; }
               rowItems.push({ item, width: cardW, imageHeight: imgH, totalHeight: totH });
               currX += slotW;
           });
           if(rowItems.length > 0) flush();

           canvas.width = exportW; canvas.height = currY;
           ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);

           let loaded = 0; const imgItems = posItems.filter(p => p.item.imageData);
           const checkDone = () => { if(loaded === imgItems.length) { const l = document.createElement('a'); l.download = `cinegrid-${Date.now()}.png`; l.href = canvas.toDataURL(); l.click(); } };
           if(imgItems.length === 0) checkDone();

           posItems.forEach(p => {
               ctx.fillStyle = '#1e293b'; ctx.fillRect(p.x, p.y, p.width, p.height);
               if(styleSettings.borderWidth > 0) { ctx.strokeStyle = styleSettings.borderColor; ctx.lineWidth = styleSettings.borderWidth; ctx.strokeRect(p.x, p.y, p.width, p.height); }
               ctx.fillStyle = '#1e293b'; ctx.fillRect(p.x, p.y + p.imageHeight, p.width, textH);
               ctx.fillStyle = styleSettings.fontColor; ctx.font = `${styleSettings.fontSize + 4}px Arial`; ctx.fillText(p.item.shotLabel || '', p.x + 12, p.y + p.imageHeight + textH/1.8);
               
               if(p.item.imageData) {
                   const img = new Image();
                   img.onload = () => {
                       ctx.save(); ctx.beginPath(); ctx.rect(p.x+styleSettings.borderWidth/2, p.y+styleSettings.borderWidth/2, p.width-styleSettings.borderWidth, p.imageHeight-styleSettings.borderWidth); ctx.clip();
                       const fit = p.item.imageFit || 'cover';
                       const r = img.width/img.height; const tr = p.width/p.imageHeight;
                       let rw=p.width, rh=p.imageHeight, rx=0, ry=0;
                       if(fit === 'contain') { if(r > tr) { rh = p.width/r; ry=(p.imageHeight-rh)/2; } else { rw=p.imageHeight*r; rx=(p.width-rw)/2; } }
                       else if(fit === 'cover') { if(r > tr) { rw=p.imageHeight*r; rx=(p.width-rw)/2; } else { rh=p.width/r; ry=(p.imageHeight-rh)/2; } }
                       ctx.drawImage(img, p.x+rx, p.y+ry, rw, rh); ctx.restore();
                       loaded++; checkDone();
                   };
                   img.src = p.item.imageData;
               }
           });
        };

        return (
          <div className="min-h-screen flex flex-col bg-slate-900 text-slate-100">
            <header className="h-16 border-b border-slate-700 bg-slate-900/90 backdrop-blur-md sticky top-0 z-40 flex items-center justify-between px-4">
              <div className="flex items-center space-x-3"><div className="p-2 bg-indigo-600 rounded-lg"><Icons.LayoutGrid className="w-5 h-5 text-white" /></div><h1 className="text-xl font-bold">CineGrid 独立版</h1></div>
              <div className="flex space-x-3"><Button variant="secondary" size="sm" onClick={() => confirm('清空？') && setGridItems([])}><Icons.Trash className="w-4 h-4 mr-2" />清空</Button><Button variant="primary" size="sm" onClick={handleExport}><Icons.Download className="w-4 h-4 mr-2" />导出</Button></div>
            </header>
            <main className="flex-1 container mx-auto p-4 flex flex-col lg:flex-row gap-6">
               <aside className="lg:w-72 flex-shrink-0 space-y-4">
                  <div className="bg-slate-800 rounded-xl p-4 shadow-lg border border-slate-700"><Button className="w-full justify-start mb-2" onClick={handleAddItem}><Icons.Plus className="w-5 h-5 mr-2" /> 添加空格子</Button><Button variant="secondary" className="w-full justify-start" onClick={() => { setIsCropperOpen(true); setSelectedFileForCrop(null); }}><Icons.Scissors className="w-5 h-5 mr-2" /> 裁剪工具</Button></div>
                  <div className="bg-slate-800 rounded-xl p-4 shadow-lg border border-slate-700">
                      <div className="mb-4 text-xs text-slate-400">默认列数</div><div className="flex bg-slate-700 p-1 rounded-lg mb-4">{[1,2,3,4].map(n => <button key={n} onClick={() => setDefaultColumns(n)} className={`flex-1 py-1 rounded text-sm ${defaultColumns===n?'bg-indigo-600':'hover:text-white text-slate-400'}`}>{n}</button>)}</div>
                      <div className="mb-2 text-xs text-slate-400">比例</div><select value={styleSettings.aspectRatio} onChange={(e) => setStyleSettings({...styleSettings, aspectRatio: e.target.value})} className="w-full bg-slate-700 border-slate-600 rounded p-2 text-sm"><option value="1/1">1:1</option><option value="4/5">4:5</option><option value="16/9">16:9</option><option value="2.35/1">2.35:1</option></select>
                  </div>
                  <div className="bg-slate-800 rounded-xl p-4 shadow-lg border border-slate-700 text-xs space-y-4">
                      <div>间距 {styleSettings.gap}px <input type="range" max="40" step="4" value={styleSettings.gap} onChange={(e) => setStyleSettings({...styleSettings, gap: +e.target.value})} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" /></div>
                      <div>边框 {styleSettings.borderWidth}px <input type="range" max="10" value={styleSettings.borderWidth} onChange={(e) => setStyleSettings({...styleSettings, borderWidth: +e.target.value})} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" /></div>
                  </div>
               </aside>
               <section className="flex-1 bg-slate-950/50 rounded-2xl border-2 border-dashed border-slate-800 p-4 relative overflow-y-auto" ref={gridContainerRef}>
                   <div className="flex flex-wrap content-start" style={{ margin: `-${styleSettings.gap/2}px`, width: `calc(100% + ${styleSettings.gap}px)` }}>
                       {gridItems.map((item, idx) => (
                           <div key={item.id} style={{ width: `${item.width || (100/defaultColumns)}%`, padding: `${styleSettings.gap/2}px` }}>
                               <div style={{ aspectRatio: `${item.aspectRatio || getDefaultAspectRatioValue()}` }}>
                                   <GridCell item={item} styleSettings={styleSettings} onUpdate={handleUpdateItem} onRemove={handleRemoveItem} onImageUpload={(f) => { const r=new FileReader(); r.onload=(e)=>handleUpdateItem(item.id, {imageData: e.target.result}); r.readAsDataURL(f); }} 
                                     draggable onDragStart={() => dragItem.current=idx} onDragEnter={() => dragOverItem.current=idx} onDragEnd={() => { const copy=[...gridItems]; const c=copy[dragItem.current]; copy.splice(dragItem.current,1); copy.splice(dragOverItem.current,0,c); setGridItems(copy); }} />
                               </div>
                           </div>
                       ))}
                   </div>
                   {gridItems.length===0 && <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-600"><Icons.ImageIcon className="w-16 h-16 opacity-20" /><div className="mt-4">暂无内容</div></div>}
               </section>
            </main>
            {isCropperOpen && <ImageCropper imageUrl={selectedFileForCrop} onCancel={() => setIsCropperOpen(false)} onExtract={(d) => handleCropAdd(d)} onComplete={(d) => { handleCropAdd(d); setIsCropperOpen(false); }} onImageReplace={setSelectedFileForCrop} />}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
